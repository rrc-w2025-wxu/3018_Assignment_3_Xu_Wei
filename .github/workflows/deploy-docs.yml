name: Deploy Documentation

# Trigger workflow manually or on push to assignment_5 branch
on:
  push:
    branches:
      - assignment_5
  workflow_dispatch:

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Generate documentation (or build frontend)
      - name: Generate documentation
        run: npm run generate-docs
        # For React/Vite frontend projects, use:
        # run: npm run build

      # 5️⃣ Deploy HTML to assignment_5 branch (root directory)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs      # Change to ./build or ./dist for React/Vite
          publish_branch: assignment_5
          force: true             # Overwrite branch content each time